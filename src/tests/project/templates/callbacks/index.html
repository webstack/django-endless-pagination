{% extends "base.html" %}

{% block content %}
  <div id="endless" class="span8">
    {% include page_template %}
  </div>
  <div class="span4">
    <div class="well">
      <h4>Notifications</h4>
      <div id="notifications">None so far...</div>
    </div>
  </div>
{% endblock %}

{% block js %}
  {{ block.super }}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const notifications = document.getElementById('notifications');

      const notify = (id, key, value) => {
        const paragraph = document.createElement('p');
        const keyEl = document.createElement('strong');
        keyEl.textContent = key + ': ';
        const valueEl = document.createElement('span');
        valueEl.id = id;
        valueEl.innerHTML = value == null ? '' : value;
        paragraph.append(keyEl, valueEl);
        notifications.append(paragraph);
      };

      const firstHeading = () => {
        const heading = document.querySelector('#endless h4');
        return heading ? heading.innerHTML : '';
      };

      const lastHeadingIn = (fragment) => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = fragment;
        const headings = wrapper.querySelectorAll('h4');
        return headings.length ? headings[headings.length - 1].innerHTML : '';
      };

      endlessPaginate({
        onClick(context) {
          notifications.innerHTML = '';
          notify('onclick', 'First object on click', firstHeading());
          notify('onclick-label', 'Clicked label', this.textContent);
          notify('onclick-url', 'URL', context.url);
          notify('onclick-key', 'Querystring key', context.key);
        },
        onCompleted(context, fragment) {
          notify('oncompleted', 'First object on completed', firstHeading());
          notify('oncompleted-label', 'Clicked label', this.textContent);
          notify('oncompleted-url', 'URL', context.url);
          notify('oncompleted-key', 'Querystring key', context.key);
          notify('fragment', 'Last object in fragment', lastHeadingIn(fragment));
        },
        pageSelector: '#endless',
      });
    });
  </script>
{% endblock %}
